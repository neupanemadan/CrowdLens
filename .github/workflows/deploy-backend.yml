name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: ap-northeast-1
  ECR_REPO_NAME: vision-ai-backend
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

  build-and-push:
    name: Build & Push to ECR
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG}"

          docker build \
            --platform linux/amd64 \
            -t "${ECR_REPO_NAME}:${IMAGE_TAG}" \
            -f backend/Dockerfile \
            backend/

          docker tag "${ECR_REPO_NAME}:${IMAGE_TAG}" "${IMAGE_URI}"
          docker tag "${ECR_REPO_NAME}:${IMAGE_TAG}" "${ECR_REGISTRY}/${ECR_REPO_NAME}:latest"

          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPO_NAME}:latest"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy-ec2:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters 'commands=[
              "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)",
              "ECR_HOST=$ACCOUNT_ID.dkr.ecr.ap-northeast-1.amazonaws.com",
              "IMAGE=$ECR_HOST/vision-ai-backend:${{ github.sha }}",
              "aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin $ECR_HOST",
              "docker system prune -a -f --filter until=24h",
              "docker pull $IMAGE",
              "docker stop vision-ai-backend 2>/dev/null || true",
              "docker rm vision-ai-backend 2>/dev/null || true",
              "docker run -d --name vision-ai-backend --restart unless-stopped -p 8000:8000 -v /opt/vision-ai/uploads:/app/uploads -v /opt/vision-ai/data:/app/data -e DATABASE_URL=sqlite:///./data/vision_ai.db $IMAGE",
              "sleep 3 && docker ps --filter name=vision-ai-backend"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll for completion (up to 5 minutes)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: Status=$STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              break
            fi
            sleep 10
          done

          # Show output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '[StatusDetails, StandardOutputContent, StandardErrorContent]' \
            --output text

          # Fail if not successful
          if [[ "$STATUS" != "Success" ]]; then
            echo "::error::SSM command finished with status: $STATUS"
            exit 1
          fi
